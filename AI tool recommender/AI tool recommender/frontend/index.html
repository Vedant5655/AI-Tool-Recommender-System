<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackMatch AI — Find Your AI Stack</title>
    
    <!-- Fonts: Inter and Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons: Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS Base -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components/glass-card.css">
    <link rel="stylesheet" href="css/components/navbar.css">
    <link rel="stylesheet" href="css/components/hero.css">
    <link rel="stylesheet" href="css/components/button.css">
    <link rel="stylesheet" href="css/components/quiz.css">
    <link rel="stylesheet" href="css/components/tool-card.css">
    <link rel="stylesheet" href="css/components/modal.css">
    <link rel="stylesheet" href="css/components/filters.css">
</head>
<body>
    <!-- Skip to content for accessibility -->
    <a href="#main-content" class="skip-link">Skip to content</a>

    <!-- Animated Chromatic Background -->
    <div class="animated-bg" aria-hidden="true">
        <div class="orb orb-violet"></div>
        <div class="orb orb-cyan"></div>
        <div class="orb orb-pink"></div>
        <div class="orb orb-emerald"></div>
        <div class="orb orb-dark"></div>
    </div>

    <!-- Sticky Navigation -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-container">
            <a href="#/" class="nav-logo">
                <i data-lucide="compass" class="logo-icon"></i>
                <span>StackMatch AI</span>
            </a>
            <div class="nav-links desktop-nav">
                <a href="#browse">Browse All</a>
                <a href="#about">How It Works</a>
                <a href="#quiz" class="btn btn-primary glass-card--chromatic">Find My Stack</a>
            </div>
            <!-- Mobile Menu Toggle -->
            <button class="hamburger-btn" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
                <i data-lucide="menu"></i>
            </button>
        </div>
        <!-- Mobile Dropdown -->
        <div id="mobile-menu" class="mobile-nav glass-card" hidden>
            <a href="#browse">Browse All</a>
            <a href="#about">How It Works</a>
            <a href="#quiz">Find My Stack</a>
        </div>
    </nav>

    <!-- Main Content App Mount Point -->
    <main id="app" tabindex="-1"></main>

    <!-- App Logic Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
